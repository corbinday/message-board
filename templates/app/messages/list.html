{% extends 'layout/primary.html' %} {% block content %}
<div class="pixel-context pixel-xs p-4 md:p-6 max-w-6xl mx-auto space-y-8">
  <header class="pb-6 border-b border-slate-800 flex justify-between items-center">
    <div>
      <h1 class="font-['Press_Start_2P'] text-lg text-white">Messages</h1>
      <p class="text-slate-500 text-[10px] uppercase tracking-tighter mt-2 font-bold">
        All received messages
      </p>
    </div>
    <a href="{{ url_for('app.home') }}"
      class="font-['Press_Start_2P'] text-[7px] sm:text-[10px] bg-slate-800 border-2 border-slate-700 p-2 sm:p-3 text-white hover:bg-slate-700 transition-all">
      Back to Dashboard
    </a>
  </header>

  <section class="min-h-48">
    <div id="messages-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
      {% include 'app/messages/_message_cards.html' %}
    </div>
    {% if not messages %}
    <div class="text-center py-12">
      <p class="text-slate-500 text-sm mb-4">No messages yet.</p>
      <a href="{{ url_for('app.message_compose') }}"
        class="font-['Press_Start_2P'] text-[10px] bg-pico-green border-2 border-pico-green px-4 py-3 text-black hover:bg-pico-green/80 transition-all inline-block">
        Compose a Message
      </a>
    </div>
    {% endif %}
  </section>
</div>
{% endblock %}
