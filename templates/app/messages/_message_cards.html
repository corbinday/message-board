{% for message in messages %}
<div data-pixel-card
  class="group bg-slate-900/40 border border-slate-800 rounded-lg p-4 inline-flex flex-col gap-3 w-fit">
  <div class="flex items-center gap-3">
    <div class="pixel-context pixel-4xs w-fit">
      <div
        class="rounded-md bg-slate-900 p-1 border border-slate-700 shadow-xl overflow-hidden flex items-center justify-center">
        <pixel-art src="{{ url_for('user.serve_avatar', user_id=message.sender.id) }}"
          class="max-w-full h-auto"></pixel-art>
      </div>
    </div>
    <div class="flex-1 space-y-1">
      <p class="font-['Press_Start_2P'] text-[10px] text-white">
        {{ message.sender.username }}
      </p>
      <p class="text-[9px] text-slate-400 uppercase tracking-wider">
        {{ message.sent_at|time_ago }}
      </p>
      <p class="text-[9px] text-slate-500 uppercase tracking-wider">
        {{ message.graphic.size.value }}
      </p>
    </div>
  </div>
  <div class="pixel-context pixel-xs w-fit">
    <div
      class="rounded-md bg-slate-900 p-2 border border-slate-700 shadow-xl overflow-hidden flex items-center justify-center">
      {% if message.graphic.frames > 1 %}
      <pixel-animation src="{{ url_for('app.serve_graphic', graphic_id=message.graphic.id) }}"
        frame-width="{{ 16 if message.graphic.size.value == 'Stellar' else (53 if message.graphic.size.value == 'Galactic' else 32) }}"
        frame-height="{{ 16 if message.graphic.size.value == 'Stellar' else (11 if message.graphic.size.value == 'Galactic' else 32) }}"
        class="max-w-full h-auto" speed="{{ (1000 / message.graphic.fps)|int }}"></pixel-animation>
      {% else %}
      <pixel-art src="{{ url_for('app.serve_graphic', graphic_id=message.graphic.id) }}"
        class="max-w-full h-auto"></pixel-art>
      {% endif %}
    </div>
  </div>
  <div class="flex gap-2 w-full">
    <button hx-post="{{ url_for('app.save_message_graphic', graphic_id=message.graphic.id) }}"
      hx-target="this" hx-swap="outerHTML"
      class="flex-1 font-['Press_Start_2P'] text-[8px] bg-slate-800 border border-slate-700 p-2 text-white hover:bg-pico-blue hover:text-white transition-all rounded"
      title="Save to Gallery">
      Save
    </button>
    <button type="button" data-pixel-download data-download-filename="message-{{ message.graphic.id }}.png"
      class="flex-1 font-['Press_Start_2P'] text-[8px] bg-slate-800 border border-slate-700 p-2 text-white hover:bg-pico-green hover:text-black transition-all rounded"
      title="Download PNG">
      {% include 'icon/download.html' %}
    </button>
    <button hx-delete="{{ url_for('app.delete_message', message_id=message.id) }}"
      hx-target="closest .group" hx-swap="outerHTML"
      hx-confirm="Delete this message? The sender's original artwork will not be affected."
      class="flex-1 font-['Press_Start_2P'] text-[8px] bg-slate-800 border border-slate-700 p-2 text-white hover:bg-pico-red hover:text-black hover:border-pico-red transition-all rounded"
      title="Delete Message">
      Delete
    </button>
  </div>
</div>
{% endfor %}
{% if messages|length == limit %}
<div hx-get="{{ url_for('app.messages_list') }}?offset={{ offset + limit }}&limit={{ limit }}"
  hx-trigger="revealed" hx-swap="outerHTML"
  class="col-span-full flex justify-center py-8">
  <span class="font-['Press_Start_2P'] text-[10px] text-slate-500">Loading more...</span>
</div>
{% endif %}
