<div class="flex flex-col gap-4 w-full" data-avatar-editor data-editor-context>
  <div class="flex flex-col gap-2">
    <div class="flex flex-wrap gap-3 items-end justify-center">
      <div class="flex flex-col gap-1 shrink-0">
        <label class="font-['Press_Start_2P'] text-[8px] text-slate-400 uppercase tracking-widest">Color</label>
        <input 
          type="color" 
          data-editor-control="color-picker"
          value="#FF0000"
          class="w-10 h-10 rounded-md border-2 border-slate-600 cursor-pointer p-1 bg-slate-800 hover:border-slate-400 transition-colors shadow-lg"
        >
      </div>

      <div class="flex flex-col gap-1 grow">
        <label class="font-['Press_Start_2P'] text-[8px] text-slate-400 uppercase tracking-widest">Tools</label>
        <div class="flex flex-wrap gap-2">
          <button
            type="button"
            data-editor-control="pen"
            class="px-2 py-2 bg-slate-800 border-2 border-slate-600 rounded hover:bg-slate-700 hover:border-slate-400 text-white transition-all active:scale-95 shadow-md"
          >
            <span class="font-['Press_Start_2P'] text-[8px]">Pen</span>
          </button>
          <button
            type="button"
            data-editor-control="eraser"
            class="px-2 py-2 bg-slate-800 border-2 border-slate-600 rounded hover:bg-slate-700 hover:border-slate-400 text-white transition-all active:scale-95 shadow-md"
          >
            <span class="font-['Press_Start_2P'] text-[8px]">Erase</span>
          </button>
          <button
            type="button"
            data-editor-control="dropper"
            class="px-2 py-2 bg-slate-800 border-2 border-slate-600 rounded hover:bg-slate-700 hover:border-slate-400 text-white transition-all active:scale-95 shadow-md"
          >
            <span class="font-['Press_Start_2P'] text-[8px]">Pick</span>
          </button>
          <button
            type="button"
            data-editor-control="clear"
            class="px-2 py-2 bg-red-900/20 border-2 border-red-900/40 rounded hover:bg-red-900/40 hover:border-red-500 text-red-200 transition-all active:scale-95 shadow-md"
          >
            <span class="font-['Press_Start_2P'] text-[8px]">Clear</span>
          </button>
        </div>
      </div>

      <div class="flex flex-col gap-1 shrink-0">
        <label class="font-['Press_Start_2P'] text-[8px] text-slate-400 uppercase tracking-widest">Load</label>
        <label class="cursor-pointer">
          <input 
            type="file" 
            accept="image/png" 
            data-editor-action="load-file"
            class="hidden"
          >
          <span class="px-2 py-2 bg-slate-800 border-2 border-slate-600 rounded hover:bg-slate-700 hover:border-slate-400 text-white transition-all shadow-md inline-block">
            <span class="font-['Press_Start_2P'] text-[8px]">PNG</span>
          </span>
        </label>
      </div>
    </div>

    <div class="flex flex-col gap-1">
      <label class="font-['Press_Start_2P'] text-[8px] text-slate-400 uppercase tracking-widest">Shift</label>
      <div class="flex gap-2">
        <button type="button" data-editor-action="shift-up"
          class="px-3 py-2 bg-slate-800 border-2 border-slate-600 rounded hover:bg-slate-700 hover:border-slate-400 text-white transition-all active:scale-95 shadow-md"
          title="Shift Up">
          <span class="font-['Press_Start_2P'] text-[8px]">↑</span>
        </button>
        <button type="button" data-editor-action="shift-left"
          class="px-3 py-2 bg-slate-800 border-2 border-slate-600 rounded hover:bg-slate-700 hover:border-slate-400 text-white transition-all active:scale-95 shadow-md"
          title="Shift Left">
          <span class="font-['Press_Start_2P'] text-[8px]">←</span>
        </button>
        <button type="button" data-editor-action="shift-down"
          class="px-3 py-2 bg-slate-800 border-2 border-slate-600 rounded hover:bg-slate-700 hover:border-slate-400 text-white transition-all active:scale-95 shadow-md"
          title="Shift Down">
          <span class="font-['Press_Start_2P'] text-[8px]">↓</span>
        </button>
        <button type="button" data-editor-action="shift-right"
          class="px-3 py-2 bg-slate-800 border-2 border-slate-600 rounded hover:bg-slate-700 hover:border-slate-400 text-white transition-all active:scale-95 shadow-md"
          title="Shift Right">
          <span class="font-['Press_Start_2P'] text-[8px]">→</span>
        </button>
      </div>
    </div>

    <div class="flex flex-col gap-1">
      <label class="font-['Press_Start_2P'] text-[8px] text-slate-400 uppercase tracking-widest">Recent</label>
      <div data-editor-control="recent-colors" class="flex gap-2 h-6 w-full flex-wrap">
        <!-- Populated by JS -->
      </div>
    </div>
  </div>

  <div class="flex justify-center w-full">
    <pixel-editor 
      width="16" 
      height="16"
      {% if initial_avatar and user %}initial-src="{{ url_for('user.serve_avatar', user_id=user.id) }}"{% endif %}
      class="border-2 border-slate-700 shadow-xl"
      id="pixel-editor-instance"
    >
      <div id="grid"></div>
    </pixel-editor>
  </div>

  <form 
    id="editor-form" 
    hx-post="{{ url_for('user.save_avatar') }}" 
    hx-trigger="submit"
    data-avatar-success-url="{{ url_for('user.account_settings') }}"
    class="flex justify-center"
  >
    <input type="hidden" name="pixel_data" id="hidden-pixel-data" />
    <button 
      type="button" 
      data-editor-action="save"
      class="font-['Press_Start_2P'] text-[10px] bg-pico-green border-2 border-pico-green px-4 py-3 text-black hover:bg-pico-green/80 hover:border-pico-green/80 transition-all mt-4 opacity-50 cursor-not-allowed"
      disabled
    >
      Save Avatar
    </button>
  </form>
</div>
