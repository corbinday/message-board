{% extends 'layout/primary.html' %} {% block content %}
<div
  class="pixel-context pixel-xs sm:pixel-sm md:pixel-md lg:pixel-lg p-4 md:p-6 lg:p-8 xl:p-10 max-w-7xl mx-auto space-y-8"
>
  <header class="border-b border-slate-800 pb-6">
    <h1 class="font-['Press_Start_2P'] text-lg text-white">Account Settings</h1>
    <p
      class="text-slate-500 text-[10px] uppercase tracking-tighter mt-2 font-bold"
    >
      Manage your profile and preferences
    </p>
  </header>

  <div class="space-y-12">
    <!-- Username Section -->
    <section class="space-y-4">
      <div class="border-l-4 border-pico-blue pl-4">
        <h2 class="font-['Press_Start_2P'] text-sm text-white">Username</h2>
        <p class="text-slate-500 text-[10px] uppercase tracking-tighter mt-1 font-bold">
          Change your display name
        </p>
      </div>

      <div class="bg-slate-900/40 border border-slate-800 rounded-lg p-6 space-y-4">
        <form
          hx-post="{{ url_for('user.update_username') }}"
          hx-target="#username-message"
          hx-swap="innerHTML"
          class="flex flex-col sm:flex-row gap-4 items-start sm:items-end"
        >
          <div class="flex-1">
            <label class="font-['Press_Start_2P'] text-[10px] text-white block mb-2">
              Current Username
            </label>
            <input
              type="text"
              name="username"
              value="{{ user.username }}"
              required
              minlength="4"
              class="w-full font-['Press_Start_2P'] text-xs bg-slate-800 border-2 border-slate-700 p-3 text-white focus:border-pico-blue focus:outline-none"
            />
          </div>
          <button
            type="submit"
            class="font-['Press_Start_2P'] text-[10px] bg-pico-blue border-2 border-pico-blue px-4 py-3 text-black hover:bg-pico-blue/80 transition-all"
          >
            Update Username
          </button>
        </form>
        <div id="username-message"></div>
      </div>
    </section>

    <!-- Avatar Section -->
    <section class="space-y-4">
      <div class="border-l-4 border-pico-green pl-4">
        <h2 class="font-['Press_Start_2P'] text-sm text-white">Avatar</h2>
        <p class="text-slate-500 text-[10px] uppercase tracking-tighter mt-1 font-bold">
          Create or update your 16×16 pixel avatar
        </p>
      </div>

      <!-- Current Avatar Preview -->
      {% if has_avatar %}
      <div class="bg-slate-900/40 border border-slate-800 rounded-lg p-6 space-y-4">
        <h3 class="font-['Press_Start_2P'] text-xs text-white">Current Avatar</h3>
        <div
          class="w-32 h-32 mx-auto rounded-md bg-slate-900 p-4 border border-slate-700 shadow-xl overflow-hidden flex items-center justify-center pixel-sm"
        >
          <pixel-art
            src="{{ url_for('user.serve_avatar', user_id=user.id) }}"
            class="max-w-full h-auto"
          ></pixel-art>
        </div>
      </div>
      {% endif %}

      <!-- Avatar Editor -->
      <div class="bg-slate-900/40 border border-slate-800 rounded-lg p-6">
        <div id="editor-container" hx-get="{{ url_for('user.avatar_editor') }}" hx-trigger="load" hx-swap="innerHTML"></div>
      </div>

      <!-- Upload Alternative -->
      <div class="bg-slate-900/40 border border-slate-800 rounded-lg p-6 space-y-4">
        <h3 class="font-['Press_Start_2P'] text-xs text-white">Or Upload a PNG</h3>
        <form
          hx-post="{{ url_for('user.avatar') }}"
          hx-encoding="multipart/form-data"
          hx-target="body"
          class="space-y-4"
        >
          <input type="hidden" name="mode" value="upload" />
          <input
            type="file"
            name="avatar_file"
            accept="image/png"
            required
            class="block w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-['Press_Start_2P'] file:bg-slate-800 file:text-white hover:file:bg-slate-700"
          />
          <button
            type="submit"
            class="font-['Press_Start_2P'] text-[10px] bg-pico-green border-2 border-pico-green px-4 py-3 text-black hover:bg-pico-green/80 transition-all"
          >
            Upload Avatar
          </button>
        </form>
      </div>
    </section>
  </div>
</div>
{% endblock %}
