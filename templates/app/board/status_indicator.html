<div
  id="status-container"
  data-board-id="{{ board.id }}"
  hx-get="{{ url_for('app.board_status', board_id=board.id) }}"
  hx-trigger="every 60s"
  hx-swap="outerHTML"
>
  <h3
    class="text-slate-500 uppercase text-[10px] font-bold tracking-widest mb-1"
  >
    Live Status
  </h3>
  <div class="flex items-center gap-2">
    {% if is_active %}
    <span class="relative flex h-2 w-2" data-presence-indicator>
      <span
        class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"
      ></span>
      <span
        class="relative inline-flex rounded-full h-2 w-2 bg-pico-green"
      ></span>
    </span>
    <p class="text-sm text-pico-green font-medium" data-presence-label>online</p>
    {% elif board.last_connected_at %}
    <span class="h-2 w-2 rounded-full bg-slate-600" data-presence-indicator title="Offline"></span>
    <p class="text-sm text-slate-600 font-medium" data-presence-label>offline</p>
    {% else %}
    <span class="h-2 w-2 rounded-full bg-slate-600" data-presence-indicator title="Offline"></span>
    <p class="text-sm text-slate-500 font-medium" data-presence-label>Never Seen</p>
    {% endif %}
  </div>
  <p class="text-[10px] text-slate-600 mt-1">
    Last check-in: {{ board.last_connected_at|time_ago }}
  </p>
</div>
